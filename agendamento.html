<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento — HrOficinas</title>
    <link rel="stylesheet" href="/estilos/agendamentostyle.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <style>
        .ag-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 16px;
            gap: 12px;
        }
        .ag-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ag-user-avatar {
            width: 34px;
            height: 34px;
            background: #2a1212;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .ag-user-avatar i {
            color: #f09595;
            font-size: 18px;
        }
        .ag-user-name {
            font-size: 13px;
            font-weight: 600;
            color: #f0f0f0;
        }
        .ag-user-label {
            font-size: 11px;
            color: #666;
        }
        .ag-btn-logout {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 12px;
            height: 32px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #888;
            font-family: 'Barlow Condensed', Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .ag-btn-logout:hover {
            background: #2a1212;
            border-color: #E24B4A;
            color: #f09595;
        }
        .ag-btn-logout i { font-size: 15px; }
    </style>
</head>
<body>

    <div class="ag-wrap">

        <!-- Barra do usuário -->
        <div class="ag-topbar">
            <div class="ag-user-info">
                <div class="ag-user-avatar">
                    <i class="ti ti-user"></i>
                </div>
                <div>
                    <div class="ag-user-name" id="ag-usuario">Usuário</div>
                    <div class="ag-user-label">Sessão ativa</div>
                </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <a href="home.html" class="ag-btn-home" aria-label="Voltar para a home">
                    <i class="ti ti-home"></i> Home
                </a>
                <button class="ag-btn-logout" onclick="logout()">
                    <i class="ti ti-logout"></i> Sair
                </button>
            </div>
        </div>

        <div class="ag-header">
            <div class="ag-icon-box">
                <i class="ti ti-tools"></i>
            </div>
            <div style="flex: 1;">
                <h1 class="ag-title">Agendamento</h1>
                <p class="ag-subtitle">Oficina mecânica — agende seu serviço</p>
            </div>
        </div>

        <div class="ag-card">
            <div class="ag-grid">
                <div class="ag-field full">
                    <label class="ag-label" for="ag-nome">Nome do cliente</label>
                    <input type="text" id="ag-nome" placeholder="Ex: João Silva" autocomplete="off">
                </div>
                <div class="ag-field full">
                    <label class="ag-label" for="ag-servico">Serviço</label>
                    <select id="ag-servico">
                        <option value="">Selecione o serviço...</option>
                        <option>Troca de óleo</option>
                        <option>Alinhamento e balanceamento</option>
                        <option>Revisão geral</option>
                        <option>Freios</option>
                        <option>Suspensão</option>
                        <option>Diagnóstico eletrônico</option>
                        <option>Ar-condicionado</option>
                        <option>Outro</option>
                    </select>
                </div>
                <div class="ag-field">
                    <label class="ag-label" for="ag-data">Data</label>
                    <input type="date" id="ag-data">
                </div>
                <div class="ag-field">
                    <label class="ag-label" for="ag-hora">Horário</label>
                    <input type="time" id="ag-hora" min="07:00" max="18:00">
                </div>
            </div>
            <button class="ag-btn" onclick="agendar()">
                <i class="ti ti-calendar-plus"></i> Confirmar agendamento
            </button>
        </div>

        <div class="ag-card">
            <div class="ag-list-header">
                <span class="ag-list-title">Agendamentos</span>
                <span class="ag-badge" id="ag-count">0</span>
            </div>
            <div id="ag-lista">
                <div class="ag-empty">
                    <i class="ti ti-calendar-off"></i>
                    Nenhum agendamento ainda
                </div>
            </div>
        </div>

    </div>

    <div class="ag-toast" id="ag-toast">
        <i class="ti ti-check"></i>
        <span id="ag-toast-msg">Agendado com sucesso!</span>
    </div>

    <script src="/aplicacao/agendamento.js"></script>

</body>
</html>
